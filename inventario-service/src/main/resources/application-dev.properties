spring.application.name=inventario-service
server.port=8090

# Conexion PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres-inventario:5432/inventario_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL del microservicio de productos
producto-service.url=http://localhost:8085

#Swagger http://localhost:8090/doc/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/