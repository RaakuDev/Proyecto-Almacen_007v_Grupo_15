spring.application.name=productos-service
server.port=8085

# Conexion PostgreSQL TEST
spring.datasource.url=jdbc:postgresql://localhost:5460/productos_test_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA para pruebas
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway desactivado para pruebas
spring.flyway.enabled=false

# URL microservicios TEST
categoria-service.url=http://localhost:8084
inventario-service.url=http://localhost:8090
proveedor-service.url=http://localhost:8086