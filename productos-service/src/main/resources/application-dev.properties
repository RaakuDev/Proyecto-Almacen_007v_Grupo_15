spring.application.name=productos-service
server.port=8085

# Conexion PostgreSQL DEV
spring.datasource.url=jdbc:postgresql://localhost:5435/productos_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL microservicios DEV
categoria-service.url=http://localhost:8084
inventario-service.url=http://localhost:8090
proveedor-service.url=http://localhost:8086

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/