spring.application.name=clientes-service
server.port=8087

# Conexion PostgreSQL DEV
spring.datasource.url=jdbc:postgresql://localhost:5437/clientes_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL del microservicio de pedidos
pedido-service.url=http://localhost:8092

#Swagger http://localhost:8087/doc/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/