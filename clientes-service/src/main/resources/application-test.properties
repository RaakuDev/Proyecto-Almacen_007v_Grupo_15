spring.application.name=clientes-service
server.port=8087

# Conexion PostgreSQL TEST
spring.datasource.url=jdbc:postgresql://localhost:5455/clientes_test_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA para pruebas
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway desactivado para pruebas
spring.flyway.enabled=false

# URL del microservicio de pedidos
pedido-service.url=http://localhost:8092

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html