spring.application.name=detalle-venta-service
server.port=8089

# URL de microservicios DEV
producto-service.url=http://localhost:8085
ventas-service.url=http://localhost:8088
inventario-service.url=http://localhost:8090

# Conexion PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres-detalle-venta:5432/detalle_venta_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#Swagger http://localhost:8089/doc/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/