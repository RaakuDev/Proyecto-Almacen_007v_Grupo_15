spring.application.name=DetalleVentas-service
server.port=8089

# URL de microservicios TEST
producto-service.url=http://localhost:8085
ventas-service.url=http://localhost:8088
inventario-service.url=http://localhost:8090

# Conexion PostgreSQL TEST
spring.datasource.url=jdbc:postgresql://localhost:5456/detalle_venta_test_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA para pruebas
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway desactivado para pruebas
spring.flyway.enabled=false