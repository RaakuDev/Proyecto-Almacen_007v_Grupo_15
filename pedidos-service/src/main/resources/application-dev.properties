spring.application.name=pedidos-service
server.port=8092

# Conexion PostgreSQL DEV
spring.datasource.url=jdbc:postgresql://localhost:5439/pedidos_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL microservicios DEV
proveedor-service.url=http://localhost:8086
producto-service.url=http://localhost:8085
cliente-service.url=http://localhost:8087

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/S