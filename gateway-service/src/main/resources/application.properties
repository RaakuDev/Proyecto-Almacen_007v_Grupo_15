spring.application.name=gateway-service
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Rutas del Gateway
spring.cloud.gateway.routes[0].id=categorias-service
spring.cloud.gateway.routes[0].uri=lb://categorias-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/categorias/**

spring.cloud.gateway.routes[1].id=productos-service
spring.cloud.gateway.routes[1].uri=lb://productos-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/productos/**

spring.cloud.gateway.routes[2].id=inventario-service
spring.cloud.gateway.routes[2].uri=lb://inventario-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/inventario/**

spring.cloud.gateway.routes[3].id=clientes-service
spring.cloud.gateway.routes[3].uri=lb://clientes-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/clientes/**

spring.cloud.gateway.routes[4].id=ventas-service
spring.cloud.gateway.routes[4].uri=lb://ventas-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/ventas/**

spring.cloud.gateway.routes[5].id=detalle-venta-service
spring.cloud.gateway.routes[5].uri=lb://detalle-venta-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/detalles/**

spring.cloud.gateway.routes[6].id=proveedores-service
spring.cloud.gateway.routes[6].uri=lb://proveedores-service
