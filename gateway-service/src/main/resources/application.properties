spring.cloud.gateway.routes[8].id=pedidos-service
spring.cloud.gateway.routes[8].uri=lb://pedidos-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/pedidos/**

spring.cloud.gateway.routes[9].id=usuarios-service
spring.cloud.gateway.routes[9].uri=lb://usuarios-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/usuarios/**,/auth/**