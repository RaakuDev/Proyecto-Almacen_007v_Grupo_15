spring.application.name=ventas-service

server.port=8088

# URL microservicios DEV
cliente-service.url=http://localhost:8087
detalle-venta-service.url=http://localhost:8089
empleado-service.url=http://localhost:8094

# Conexion PostgreSQL DEV
spring.datasource.url=jdbc:postgresql://localhost:5438/ventas_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/